name: test
on:
  push: { branches: [master, main] }
  pull_request:

jobs:
  suite:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: ensure deps
        run: command -v jq >/dev/null || (sudo apt-get update && sudo apt-get install -y jq)
        if: runner.os == 'Linux'
      - name: full test suite (integrity + smoke + onboarding + per-command behavioral)
        run: ./test/run.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck -S warning bin/grandma lib/*.sh install.sh test/*.sh test/lib/*.sh
